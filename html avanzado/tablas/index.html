<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilos.css">
    <title>Tablas</title>
</head>
<body>
<!-- Tag para tablas  -->
<table>
        <!-- Encabezado de la tabla -->
        <thead>
                <!--Arma una fila-->
                <tr>
                <!-- Encabezados de una columna -->
                        <th>PRODUCTO</th>
                        <th>COSTO</th>
                        <th>UNIDADES</th>
                </tr>
        </thead>
        <!-- Datos de la tabla -->
        <tbody>
                <tr>
                        <!--Define celdas para las filas-->
                        <td>Dato 1</td>
                        <td>Dato 2</td>
                        <td>Dato 3</td>
                </tr>
                <tr>
                        <td>Dato 1 </td>
                        <td>Dato 2  </td>
                        <td>Dato 3 </td> 
                </tr>
                <tr>
                        <td>Dato 1 </td>
                        <td>Dato 2  </td> 
                        <td>Dato 3 </td>
                </tr>
        </tbody>
        <!-- Pie de la tabla, resumen de la tabla -->
        <tfoot>
                <tr>
                        <th class="header_total">Total</th>
                        <!-- Para que ocupe dos celdas  -->
                        <td class="dato_total" colspan="2">9</td>
                </tr>
        </tfoot>
</table>
</body>
</html>
