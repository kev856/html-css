<body>
<video controls loop autoplay muted src="video.mp4"><track src="caption.vtt" default kind="captions" srclang="es" label="Español (Latinoamérica)"></track> Tu navegador no soporta video</video>
<!-- Controls es para darle botones y barras para controlar el video, autoplay es para que se reproduzca el video al entrar en la página y muted es para que se reproduzca en silencio cuando se refresque la página, loop para que se reproduzca en bucle y se escribe lo de no soporta video por si a alguien el navegador no le soporte el video -->
</body>
<audio src="audio.mp3" controls></audio>
